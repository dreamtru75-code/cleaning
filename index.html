<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간 위생 및 청소 점검표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Brush+Script&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .font-hand { font-family: 'Nanum Brush Script', cursive; font-size: 1.5rem; color: #2563eb; }
        
        /* Web Table Styles */
        .grid-table { 
            display: grid; 
            grid-template-columns: 45px 1fr repeat(5, 60px) 180px; 
            background: white; 
            border: 1px solid #e2e8f0;
        }
        .grid-cell { 
            border: 0.5px solid #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 4px; 
            font-size: 0.85rem; 
            min-height: 2.5rem; 
        }
        .header-cell { background-color: #f1f5f9; font-weight: bold; color: #475569; position: sticky; top: 0; z-index: 10; }
        .clickable-cell { cursor: pointer; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .clickable-cell:hover { background-color: #f0f9ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* PRINT OPTIMIZATION (Strict A4 Layout) */
        @media print {
            @page { 
                size: A4 portrait; 
                /* 여백을 0으로 설정하여 브라우저의 자동 헤더/푸터(URL, 시간 등) 출력을 강제로 제거 */
                margin: 0; 
            }
            body { 
                background: white; 
                padding: 0; 
                margin: 0;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            /* 실제 콘텐츠 영역에 여백을 주어 잘리지 않게 함 */
            .print-page { 
                page-break-after: always; 
                width: 210mm;
                height: 297mm;
                padding: 15mm 15mm 15mm 15mm;
                box-sizing: border-box;
                position: relative;
            }
            
            table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.2px solid #000; margin-bottom: 5px; }
            th, td { 
                border: 1px solid #000; 
                padding: 0; 
                font-size: 8.5pt; 
                text-align: center; 
                height: 7.2mm; 
                line-height: 1.2; 
                vertical-align: middle; 
            }
            
            .font-hand-print { 
                font-family: 'Nanum Brush Script', cursive; 
                font-size: 11pt !important; 
                color: #000;
            }
            
            .col-no { width: 25px; }
            .col-task { width: auto; text-align: left !important; padding-left: 6px !important; font-size: 8.5pt; }
            .col-day { width: 42px; } 
            .col-note { width: 140px; }

            .print-title { font-size: 20pt; font-weight: bold; text-align: center; margin-bottom: 15px; text-decoration: underline; text-underline-offset: 5px; }
            .print-header-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 10pt; font-weight: 500; }
            
            .improvement-box { width: 100%; margin-top: 10px; border-collapse: collapse; }
            .improvement-box td { height: 10mm; text-align: left; padding-left: 10px; }
            .improvement-label { width: 80px; background-color: #f8f8f8; font-weight: bold; text-align: center !important; padding-left: 0 !important; }

            .sign-area { margin-top: 15px; font-size: 10pt; display: flex; justify-content: flex-end; gap: 40px; font-weight: bold; }
        }
    </style>
</head>
<body>

    <!-- Web Interface -->
    <div class="max-w-5xl mx-auto my-6 bg-white shadow-xl rounded-2xl overflow-hidden no-print">
        <header class="bg-blue-900 text-white p-5">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-bold" id="displaySchool">순천부영초등학교</h1>
                    <p class="text-blue-300 text-sm">dikin@naver.com</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-white text-blue-900 px-4 py-2 rounded-lg font-bold text-sm shadow hover:bg-blue-50 transition-colors">인쇄하기</button>
                    <button onclick="toggleSettings()" class="bg-blue-800 p-2 rounded-lg hover:bg-blue-700">⚙</button>
                </div>
            </div>
            
            <div class="mt-6 flex flex-wrap items-center gap-4 bg-blue-950/40 p-3 rounded-xl">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-blue-200 uppercase">점검주간:</span>
                    <input type="date" id="weekPicker" onchange="loadWeek()" class="bg-blue-900 border border-blue-700 rounded px-2 py-1 text-sm outline-none">
                </div>
                <div class="flex gap-1">
                    <button onclick="checkAllDay(0)" class="w-8 h-8 flex items-center justify-center bg-blue-800 rounded text-xs hover:bg-blue-600 transition-colors">월</button>
                    <button onclick="checkAllDay(1)" class="w-8 h-8 flex items-center justify-center bg-blue-800 rounded text-xs hover:bg-blue-600 transition-colors">화</button>
                    <button onclick="checkAllDay(2)" class="w-8 h-8 flex items-center justify-center bg-blue-800 rounded text-xs hover:bg-blue-600 transition-colors">수</button>
                    <button onclick="checkAllDay(3)" class="w-8 h-8 flex items-center justify-center bg-blue-800 rounded text-xs hover:bg-blue-600 transition-colors">목</button>
                    <button onclick="checkAllDay(4)" class="w-8 h-8 flex items-center justify-center bg-blue-800 rounded text-xs hover:bg-blue-600 transition-colors">금</button>
                </div>
                <div id="weekRangeDisplay" class="ml-auto text-sm font-mono text-blue-200"></div>
            </div>
        </header>

        <nav class="flex border-b">
            <button onclick="showTab('hygiene')" id="btn-hygiene" class="flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white">위생점검</button>
            <button onclick="showTab('cleaning')" id="btn-cleaning" class="flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-50">청소점검</button>
        </nav>

        <div class="p-4 bg-slate-50 overflow-y-auto" style="max-height: 600px;">
            <div id="hygiene" class="tab-content active"><div class="grid-table" id="hygieneGrid"></div></div>
            <div id="cleaning" class="tab-content"><div class="grid-table" id="cleaningGrid"></div></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">정보 설정</h3>
            <div class="space-y-4">
                <input type="text" id="schoolInput" placeholder="학교명" class="w-full p-2 border rounded-lg text-sm">
                <input type="text" id="cookInput" placeholder="작성자명" class="w-full p-2 border rounded-lg text-sm">
                <input type="text" id="approverInput" placeholder="확인자명" class="w-full p-2 border rounded-lg text-sm">
            </div>
            <button onclick="saveSettings()" class="w-full mt-6 py-2 bg-blue-600 text-white rounded-lg font-bold">저장</button>
        </div>
    </div>

    <!-- Print View -->
    <div class="hidden print-only" id="printLayout">
        <!-- Page 1: Hygiene -->
        <div class="print-page">
            <div class="print-title">주간 위생 점검표</div>
            <div class="print-header-info">
                <div>기관명: <span class="p-school"></span></div>
                <div>점검기간: <span class="p-range"></span></div>
            </div>
            <table>
                <thead>
                    <tr style="background:#f1f5f9;">
                        <th class="col-no">No</th><th class="col-task">점검사항</th>
                        <th class="col-day">월</th><th class="col-day">화</th><th class="col-day">수</th><th class="col-day">목</th><th class="col-day">금</th>
                        <th class="col-note">비고</th>
                    </tr>
                </thead>
                <tbody id="pBodyHygiene"></tbody>
            </table>
            <table class="improvement-box">
                <tr>
                    <td rowspan="2" class="improvement-label">개선 및<br>조치사항</td>
                    <td>1. </td>
                </tr>
                <tr>
                    <td>2. </td>
                </tr>
            </table>
            <div class="sign-area">
                <span>작성자: <span class="p-cook"></span> (인)</span>
                <span>확인자: <span class="p-approver"></span> (인)</span>
            </div>
        </div>

        <!-- Page 2: Cleaning -->
        <div class="print-page">
            <div class="print-title">주간 청소 점검표</div>
            <div class="print-header-info">
                <div>기관명: <span class="p-school"></span></div>
                <div>점검기간: <span class="p-range"></span></div>
            </div>
            <table>
                <thead>
                    <tr style="background:#f1f5f9;">
                        <th class="col-no">No</th><th class="col-task">점검사항</th>
                        <th class="col-day">월</th><th class="col-day">화</th><th class="col-day">수</th><th class="col-day">목</th><th class="col-day">금</th>
                        <th class="col-note">비고</th>
                    </tr>
                </thead>
                <tbody id="pBodyCleaning"></tbody>
            </table>
            <table class="improvement-box">
                <tr>
                    <td rowspan="2" class="improvement-label">개선 및<br>조치사항</td>
                    <td>1. </td>
                </tr>
                <tr>
                    <td>2. </td>
                </tr>
            </table>
            <div class="sign-area">
                <span>작성자: <span class="p-cook"></span> (인)</span>
                <span>확인자: <span class="p-approver"></span> (인)</span>
            </div>
        </div>
    </div>

    <script>
        const hTasks = [
            "건강상태(설사, 발열, 구토) 여부", "손가락의 상처 및 화농성 질환 여부", "위생복, 위생모, 위생화 착용 상태",
            "손 세척 및 소독(배식전 포함) 여부", "손톱의 청결상태 및 매니큐어 여부", "조리사 심리적 안도감 및 친절 상태",
            "부패/변질 식재료 사용 금지 준수", "검수 시 온도의 적절성 확인", "식재료의 위생적 구분 보관 상태",
            "보존식 채취 및 보관(-18℃ 이하)", "냉장/냉동고 적정 온도 유지 여부", "조리 전/후 식품의 교차오염 방지",
            "가열 조리 시 중심온도 측정(85℃)", "채소/과일류의 세척 및 소독 여부", "배식 시 위생장갑 및 마스크 착용",
            "비오염구역과 오염구역의 구분", "방충 및 방서 시설의 관리 상태", "칼, 도마 등 용도별 구분 사용",
            "조리기구 세척 후 건조 및 소독", "수돗물 외 음용수 정기 수질검사", "바닥의 청결 및 배수구 찌꺼기 제거",
            "쓰레기통 덮개 비치 및 위생 관리", "청소도구의 위생적 보관 상태", "가스/전기 누설 및 차단기 점검",
            "소화기 압력계 및 인근 통로 확보", "유통기한 경과 제품 보관 여부"
        ];

        const cTasks = [
            "취사기 및 밥솥 주변의 세척 상태", "국솥 및 조림솥 하단부 찌꺼기 제거", "튀김기 및 볶음솥 세척 후 건조",
            "식판 및 찬통의 살균/세척 상태", "세정대 내외부의 기름때 제거", "조리대 및 작업대 하부 선반 청결",
            "칼/도마 소독고 내부의 청결 유지", "자외선 살균기 내부 램프 작동 확인", "트랜치 내부 및 덮개의 이물질 제거",
            "후드 필터 및 내부 기름방울 제거", "유리창 먼지 및 방충망 훼손 여부", "종사자 휴게실 및 화장실 청결",
            "냉장고 선반 및 바닥 물청소", "환풍기 및 닥트 흡입구 먼지 제거", "청소용 세제 및 소독제 라벨링 보관",
            "식기 건조 선반의 하부 먼지 제거", "배수구 트랩의 거름망 청결 상태", "문 손잡이 및 전원 스위치 소독",
            "걸레 건조대 및 청소도구함 정리", "조명기구 덮개 및 천장 거미줄 제거", "배식 카트 바퀴의 머리카락 제거",
            "냉난방기 필터 청소 및 외관 청결", "소화기 외관의 부식 및 변형 확인", "소화시설 인근의 물품 적재 여부"
        ];

        let state = {
            school: localStorage.getItem('s_name') || "순천부영초등학교",
            cook: localStorage.getItem('c_name') || "",
            approver: localStorage.getItem('a_name') || "양선희",
            data: {} 
        };

        function init() {
            const today = new Date();
            const mon = new Date(today.setDate(today.getDate() + (today.getDay() === 0 ? -6 : 1 - today.getDay())));
            document.getElementById('weekPicker').value = mon.toISOString().split('T')[0];
            updateInfo();
            loadWeek();
        }

        function updateInfo() {
            document.getElementById('displaySchool').innerText = state.school;
            document.getElementById('schoolInput').value = state.school;
            document.getElementById('cookInput').value = state.cook;
            document.getElementById('approverInput').value = state.approver;
            document.querySelectorAll('.p-school').forEach(e => e.innerText = state.school);
            document.querySelectorAll('.p-cook').forEach(e => e.innerText = state.cook);
            document.querySelectorAll('.p-approver').forEach(e => e.innerText = state.approver);
        }

        function loadWeek() {
            const weekKey = document.getElementById('weekPicker').value;
            const saved = localStorage.getItem(`week_${weekKey}`);
            
            if (saved) {
                state.data = JSON.parse(saved);
            } else {
                state.data = {
                    hygiene: { checks: hTasks.map(() => Array(5).fill("")), notes: hTasks.map(() => "") },
                    cleaning: { checks: cTasks.map(() => Array(5).fill("")), notes: cTasks.map(() => "") }
                };
            }

            const mon = new Date(weekKey);
            const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
            const range = `${mon.getFullYear()}.${mon.getMonth()+1}.${mon.getDate()} ~ ${fri.getFullYear()}.${fri.getMonth()+1}.${fri.getDate()}`;
            document.getElementById('weekRangeDisplay').innerText = range;
            document.querySelectorAll('.p-range').forEach(e => e.innerText = range);

            render();
        }

        function render() {
            const build = (tasks, type) => {
                let html = `<div class="grid-cell header-cell">No</div><div class="grid-cell header-cell">점검사항</div><div class="grid-cell header-cell">월</div><div class="grid-cell header-cell">화</div><div class="grid-cell header-cell">수</div><div class="grid-cell header-cell">목</div><div class="grid-cell header-cell">금</div><div class="grid-cell header-cell">비고</div>`;
                tasks.forEach((task, i) => {
                    html += `<div class="grid-cell font-bold text-slate-400">${i+1}</div><div class="grid-cell justify-start px-2 font-medium">${task}</div>`;
                    for(let d=0; d<5; d++) {
                        const val = state.data[type].checks[i][d];
                        html += `<div class="grid-cell p-0"><div class="clickable-cell font-hand" onclick="cycle('${type}', ${i}, ${d})">${val}</div></div>`;
                    }
                    html += `<div class="grid-cell p-1"><input type="text" class="w-full h-full bg-transparent text-xs px-1 outline-none" value="${state.data[type].notes[i]}" onchange="updNote('${type}', ${i}, this.value)"></div>`;
                });
                return html;
            };
            document.getElementById('hygieneGrid').innerHTML = build(hTasks, 'hygiene');
            document.getElementById('cleaningGrid').innerHTML = build(cTasks, 'cleaning');

            const buildPrint = (tasks, type) => {
                let html = "";
                tasks.forEach((task, i) => {
                    html += `<tr><td>${i+1}</td><td class="col-task">${task}</td>`;
                    for(let d=0; d<5; d++) html += `<td class="font-hand-print">${state.data[type].checks[i][d]}</td>`;
                    html += `<td>${state.data[type].notes[i]}</td></tr>`;
                });
                return html;
            };
            document.getElementById('pBodyHygiene').innerHTML = buildPrint(hTasks, 'hygiene');
            document.getElementById('pBodyCleaning').innerHTML = buildPrint(cTasks, 'cleaning');
        }

        function cycle(type, row, col) {
            const cur = state.data[type].checks[row][col];
            state.data[type].checks[row][col] = cur === "" ? "양호" : (cur === "양호" ? "미흡" : "");
            save(); render();
        }

        function checkAllDay(col) {
            const type = document.getElementById('hygiene').classList.contains('active') ? 'hygiene' : 'cleaning';
            const tasks = type === 'hygiene' ? hTasks : cTasks;
            tasks.forEach((_, i) => state.data[type].checks[i][col] = "양호");
            save(); render();
        }

        function updNote(type, row, val) {
            state.data[type].notes[row] = val;
            save(); render();
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-hygiene').className = t === 'hygiene' ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white" : "flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-50";
            document.getElementById('btn-cleaning').className = t === 'cleaning' ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white" : "flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-50";
        }

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }

        function saveSettings() {
            state.school = document.getElementById('schoolInput').value;
            state.cook = document.getElementById('cookInput').value;
            state.approver = document.getElementById('approverInput').value;
            localStorage.setItem('s_name', state.school);
            localStorage.setItem('c_name', state.cook);
            localStorage.setItem('a_name', state.approver);
            updateInfo(); toggleSettings(); render();
        }

        function save() {
            localStorage.setItem(`week_${document.getElementById('weekPicker').value}`, JSON.stringify(state.data));
        }

        init();
    </script>
</body>
</html>
